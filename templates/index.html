<!DOCTYPE html>
<html>

<head>

<title>AI Career Predictor</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h2>AI Career Predictor</h2>

<form action="/predict" method="post">

<label>Programming Skill (1-5)</label><br>
<input type="number" name="skill1" min="1" max="5" required><br>

<label>Mathematics Skill (1-5)</label><br>
<input type="number" name="skill2" min="1" max="5" required><br>

<label>Data Analysis Skill (1-5)</label><br>
<input type="number" name="skill3" min="1" max="5" required><br>

<label>Communication Skill (1-5)</label><br>
<input type="number" name="skill4" min="1" max="5" required><br>

<label>Creativity Skill (1-5)</label><br>
<input type="number" name="skill5" min="1" max="5" required><br><br>

<button type="submit">Predict Career</button>

</form>

<div class="result">

{{ prediction_text }}

</div>

</div>

</body>
</html>
